<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">Waiver Flow State Machine</text>

  <!-- Start -->
  <circle cx="100" cy="100" r="20" fill="#333"/>
  <text x="100" y="75" text-anchor="middle" font-family="Arial" font-size="12">Start</text>

  <!-- Check localStorage -->
  <rect x="180" y="80" width="140" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" font-family="Arial" font-size="11">Check localStorage</text>
  <line x1="120" y1="100" x2="175" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision Diamond -->
  <polygon points="400,60 470,100 400,140 330,100" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="Arial" font-size="10">waiverSigned</text>
  <text x="400" y="110" text-anchor="middle" font-family="Arial" font-size="10">== 'true'?</text>
  <line x1="320" y1="100" x2="328" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Yes path - to JoinUs -->
  <rect x="550" y="80" width="120" height="40" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
  <text x="610" y="105" text-anchor="middle" font-family="Arial" font-size="11">Show JoinUs</text>
  <line x1="470" y1="100" x2="545" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="505" y="90" font-family="Arial" font-size="10" fill="#388e3c">Yes</text>

  <!-- No path - to Waiver -->
  <rect x="330" y="200" width="140" height="40" rx="5" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" font-family="Arial" font-size="11">Show Waiver Form</text>
  <line x1="400" y1="140" x2="400" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="415" y="170" font-family="Arial" font-size="10" fill="#d32f2f">No</text>

  <!-- Google Form iframe -->
  <rect x="330" y="280" width="140" height="40" rx="5" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
  <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="10">Embedded</text>
  <text x="400" y="312" text-anchor="middle" font-family="Arial" font-size="10">Google Form</text>
  <line x1="400" y1="240" x2="400" y2="275" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- User fills form -->
  <rect x="330" y="360" width="140" height="40" rx="5" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" font-family="Arial" font-size="11">User fills form</text>
  <line x1="400" y1="320" x2="400" y2="355" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Acknowledge button -->
  <rect x="330" y="440" width="140" height="50" rx="5" fill="#e1bee7" stroke="#7b1fa2" stroke-width="2"/>
  <text x="400" y="460" text-anchor="middle" font-family="Arial" font-size="10">Click "I Have</text>
  <text x="400" y="475" text-anchor="middle" font-family="Arial" font-size="10">Submitted Waiver"</text>
  <line x1="400" y1="400" x2="400" y2="435" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Set localStorage -->
  <rect x="540" y="440" width="140" height="50" rx="5" fill="#b2dfdb" stroke="#00796b" stroke-width="2"/>
  <text x="610" y="460" text-anchor="middle" font-family="Arial" font-size="10">Set localStorage</text>
  <text x="610" y="475" text-anchor="middle" font-family="Arial" font-size="10">waiverSigned=true</text>
  <line x1="470" y1="465" x2="535" y2="465" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Continue button -->
  <rect x="540" y="530" width="140" height="40" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
  <text x="610" y="555" text-anchor="middle" font-family="Arial" font-size="11">Click "Continue"</text>
  <line x1="610" y1="490" x2="610" y2="525" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow back to JoinUs -->
  <path d="M 680 550 Q 750 550 750 300 Q 750 100 675 100" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- End -->
  <circle cx="610" cy="160" r="15" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="610" cy="160" r="10" fill="#333"/>
  <line x1="610" y1="120" x2="610" y2="143" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="610" y="185" text-anchor="middle" font-family="Arial" font-size="10">End</text>

  <!-- Legend -->
  <rect x="50" y="500" width="200" height="90" fill="#f5f5f5" stroke="#999" rx="5"/>
  <text x="150" y="520" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Legend</text>
  <rect x="60" y="530" width="20" height="15" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="90" y="542" font-family="Arial" font-size="10">Success state</text>
  <rect x="60" y="550" width="20" height="15" fill="#fff9c4" stroke="#fbc02d"/>
  <text x="90" y="562" font-family="Arial" font-size="10">Waiver required</text>
  <rect x="60" y="570" width="20" height="15" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="90" y="582" font-family="Arial" font-size="10">Check/Action</text>
</svg>
